# Azure DevOps Pipeline for API Service
# 觸發條件：只有在 main 分支且 API/ 目錄底下檔案有變更時才觸發

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - API/**

pr: none

variables:
  # ---------------------------------------------------------------------------
  # ⚠️ 請根據您的 Azure DevOps 與 Azure 環境修改以下變數：
  # azureSubscription: Azure DevOps 中設定的 Service Connection 名稱
  # webAppName: Azure App Service (Web App) 的名稱
  # ---------------------------------------------------------------------------
  azureSubscription: 'YOUR_AZURE_SERVICE_CONNECTION_NAME'
  webAppName: 'YOUR_AZURE_WEB_APP_NAME'

  dotnetVersion: '10.0.x'
  buildConfiguration: 'Release'
  workingDirectory: '$(System.DefaultWorkingDirectory)/API'

stages:
  - stage: Build
    displayName: 'Build and Package API'
    jobs:
      - job: BuildJob
        displayName: 'Build & Package Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # 1. 安裝指定版本的 .NET SDK
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: '$(dotnetVersion)'
              includePreview: true

          # 2. 還原 NuGet 套件
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              projects: '$(workingDirectory)/Dashboard.Api.csproj'

          # 3. 編譯 API 專案
          - task: DotNetCoreCLI@2
            displayName: 'Build API Project'
            inputs:
              command: 'build'
              projects: '$(workingDirectory)/Dashboard.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          # 4. 發布 (Publish) API 專案打包成 Zip
          - task: DotNetCoreCLI@2
            displayName: 'Publish API Project'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(workingDirectory)/Dashboard.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/publish --no-build'
              zipAfterPublish: true

          # 5. 上傳 Artifact
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/publish'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy API to Azure Web App'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy Job'
        environment: 'Production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webApp'
                    appName: '$(webAppName)'
                    package: '$(Pipeline.Workspace)/drop/*.zip'
