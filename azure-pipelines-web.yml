# Azure DevOps Pipeline for Frontend Web (Angular)
# 觸發條件：只有在 main 分支且 Web/ 目錄底下檔案有變更時才觸發

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Web/**

pr: none

variables:
  nodeVersion: '20.x'
  workingDirectory: '$(System.DefaultWorkingDirectory)/Web'

stages:
  - stage: Build
    displayName: 'Build Angular Web App'
    jobs:
      - job: BuildJob
        displayName: 'Build Angular Web Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # 1. 安裝指定版本的 Node.js
          - task: UseNode@1
            displayName: 'Install Node.js'
            inputs:
              version: '$(nodeVersion)'

          # 2. 還原 npm 套件
          - task: Npm@1
            displayName: 'Install npm packages'
            inputs:
              command: 'ci'
              workingDir: '$(workingDirectory)'

          # 3. 編譯 Angular 專案 (main 分支使用 production 環境設定)
          - task: Npm@1
            displayName: 'Build Angular Project'
            condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
            inputs:
              command: 'custom'
              workingDir: '$(workingDirectory)'
              customCommand: 'run build -- --configuration production'

          # 4. 壓縮編譯產出為 zip 檔案 (供 Release Deploy Task 讀取 *.zip)
          - task: ArchiveFiles@2
            displayName: 'Archive dist folder to zip'
            inputs:
              rootFolderOrFile: '$(workingDirectory)/dist/dashboard-kanban-web'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/dist.zip'
              replaceExistingArchive: true

          # 5. 上傳編譯產物 (Artifact)
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Web Build Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'web-drop'
              publishLocation: 'Container'
