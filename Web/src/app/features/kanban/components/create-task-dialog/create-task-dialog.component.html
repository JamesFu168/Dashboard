<div class="dialog-overlay" (click)="cancel()">
  <form class="dialog-card" [formGroup]="form" (ngSubmit)="submit()" (click)="$event.stopPropagation()">
    <h2>新增任務</h2>
    <p class="target-card">於「{{ card.title }}」新增</p>

    <label class="field">
      <span>任務名稱</span>
      <input type="text" formControlName="title" placeholder="輸入任務名稱" autofocus>
    </label>

    <label class="field">
      <span>截止日期（選填）</span>
      <input type="date" formControlName="dueDate">
    </label>

    @if (card.scope === CardScope.Organization) {
      <label class="field">
        <span>指派給</span>
        <select formControlName="assigneeId">
          @for (user of departmentUsers(); track user.id) {
            <option [ngValue]="user.id">{{ user.name }}</option>
          }
        </select>
      </label>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <div class="dialog-actions">
      <button type="button" class="cancel-button" (click)="cancel()">取消</button>
      <button type="submit" [disabled]="form.invalid || submitting()">
        {{ submitting() ? '新增中…' : '新增任務' }}
      </button>
    </div>
  </form>
</div>
