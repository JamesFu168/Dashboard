<main class="login-shell">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <p class="eyebrow">Kanban Dashboard</p>
    <h1>Sign in</h1>

    <label class="field">
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="username" placeholder="you@company.com">
    </label>

    <label class="field">
      <span>Password</span>
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••">
    </label>

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="form.invalid || submitting()">
      {{ submitting() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</main>
